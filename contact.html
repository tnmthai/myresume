<div class="contact-page">
  <div class="contact-header">
    <h1><i class="fas fa-paper-plane"></i> Get in Touch</h1>
    <p>Have a question or want to work together? Send me a message!</p>
  </div>

  <div class="contact-grid">
    <div class="contact-info-card">
      <h3><i class="fas fa-info-circle"></i> Contact Info</h3>
      <div class="contact-links">
        <a href="mailto:me@tnmthai.com" class="contact-link-item">
          <i class="fas fa-envelope"></i>
          <span>me@tnmthai.com</span>
        </a>
        <a href="https://www.linkedin.com/in/tnmthai" target="_blank" class="contact-link-item">
          <i class="fab fa-linkedin"></i>
          <span>linkedin.com/in/tnmthai</span>
        </a>
        <a href="https://github.com/tnmthai" target="_blank" class="contact-link-item">
          <i class="fab fa-github"></i>
          <span>github.com/tnmthai</span>
        </a>
        <a href="https://tnmthai.medium.com" target="_blank" class="contact-link-item">
          <i class="fab fa-medium"></i>
          <span>tnmthai.medium.com</span>
        </a>
      </div>
    </div>

    <div class="contact-form-card">
      <h3><i class="fas fa-envelope-open-text"></i> Send a Message</h3>
      <form action="https://formspree.io/f/mvgoqlkr" method="POST" class="contact-form">
        <div class="form-group">
          <label for="email">Your Email</label>
          <input type="email" name="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="message">Your Message</label>
          <textarea name="message" id="message" rows="5" placeholder="Write your message here..." required></textarea>
        </div>
        <button type="submit" class="btn-submit">
          <i class="fas fa-paper-plane"></i> Send Message
        </button>
      </form>
    </div>
  </div>
</div>
