<!DOCTYPE html>

  {% include head.html %}
  <style>
    body {
      padding: 0 !important;
    }
    .wrapper {
      max-width: unset !important;
    }
    /* Print: expand all sections, hide accordion toggles */
    .accordion-content { display: block !important; }
    .accordion-toggle .chevron { display: none !important; }

    .resume-actions { display: none !important; }
  </style>
  <body>
    <div class="wrapper resume-layout">
      {% include resume-header.html %}
      <div class="main-wrapper">{{ content }}</div>
    </div>
    {% include scripts.html %}
  </body>
