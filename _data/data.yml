career-profile:
    title: About Me
    summary: |
      <p>GIS Analyst and Remote Sensing Specialist with 3+ years of experience in enterprise GIS, spatial analysis, satellite/UAV remote sensing, and geospatial automation across local government, agriculture, defence, renewable energy, and environmental sectors. Skilled in ArcGIS Pro, QGIS, Python, SQL Server geodatabases, Google Earth Engine, and spatial data governance.
      <p>PhD in Computer Science with strong experience in applied research, stakeholder engagement, and scalable geospatial solution development. Author of 6 peer-reviewed publications.

education:
    title: Education
    info:
      - degree: PhD in Computer Science (Dean's List)
        university: Lincoln University — New Zealand
        time: 2017 – 2021
        details: |
          Full PhD Scholarship (Ministry of Education and Training, Vietnam). Research: autonomous regeneration systems using neural-network-based computational frameworks. Supervised by Prof. Sandhya Samarasinghe and Prof. Don Kulasiri, with collaboration from Prof. Michael Levin (Harvard/Tufts).

      - degree: Master of Science in Computer Science and Engineering
        university: National Chiao Tung University — Taiwan
        time: 2012 – 2014
        details: |
          Full MSc Scholarship. Focus: Data Mining, AI, and Machine Learning. Thesis: Methods for Abnormal Usage Detection in Smart Home Systems.

experiences:
    title: Professional Experience
    info:
      - role: <strong>Geospatial Research Assistant</strong>
        time: <em>05/2022 – 10/2025</em>
        company: Lincoln Agritech Ltd., Lincoln University, New Zealand
        details: |
            <p><span>&#45;</span> Led satellite and UAV imagery workflows from acquisition to analysis and reporting.
            <p><span>&#45;</span> Automated satellite and UAV processing workflows using Python.
            <p><span>&#45;</span> Operated eBeeX UAV platforms with RedEdge, Duet T, and SODA 3D sensors.
            <p><span>&#45;</span> Processed UAV imagery in Pix4D for orthomosaics and DSM generation.
            <p><span>&#45;</span> Operated RTK-GNSS systems (Trimble R10) for high-accuracy spatial data collection.
            <p><span>&#45;</span> Developed SOPs and technical documentation for geospatial workflows.
            <p><span>&#45;</span> Delivered training sessions, workshops, and technical reports for stakeholders.

      - role: <strong>GIS Mapping & Analysis Resource — Consulting Contract</strong>
        time: <em>05/2025 – 07/2025</em>
        company: Christchurch City Council, New Zealand
        details: |
            <p><span>&#45;</span> Managed parcel, zoning, and District Plan datasets in enterprise GIS environments.
            <p><span>&#45;</span> Maintained spatial data quality and enterprise GIS standards.
            <p><span>&#45;</span> Performed spatial data validation and prepared datasets for publication.
            <p><span>&#45;</span> Produced statutory planning maps and spatial outputs for internal stakeholders.
            <p><span>&#45;</span> Collaborated across business units to deliver fit-for-purpose spatial solutions.

      - role: <strong>Research Technician</strong>
        time: <em>11/2025 – Present</em>
        company: Lincoln University, New Zealand
        details: |
            <p><span>&#45;</span> Supported laboratory and field research activities for education and research projects.
            <p><span>&#45;</span> Collected and prepared environmental samples for scientific analysis.
            <p><span>&#45;</span> Assisted with experimental setup, data collection, and reporting.

      - role: <strong>Lecturer and Researcher</strong>
        time: <em>10/2008 – Present</em>
        company: Can Tho University, Vietnam
        details: |
            <p><span>&#45;</span> Delivered courses in GIS, programming, databases, and data science.
            <p><span>&#45;</span> Supervised undergraduate and Master's research projects.
            <p><span>&#45;</span> Led ESA-funded rice mapping research projects.
            <p><span>&#45;</span> Organised GIS, Python, and remote sensing workshops.

      - role: <strong>Postdoctoral Researcher — AI / Machine Learning</strong>
        time: <em>07/2021 – 12/2021</em>
        company: Lincoln University, New Zealand
        details: |
            <p><span>&#45;</span> Developed neural-network models for biological system analysis.
            <p><span>&#45;</span> Implemented data processing and modelling workflows in Python, MATLAB, and R.
            <p><span>&#45;</span> Published scientific papers and technical reports.

projects:
    title: Selected Projects
    intro: |
        Key projects demonstrating applied geospatial expertise across government, agriculture, and technology sectors.
    assignments:
      - title: "Bucket Test from Space — Principal Investigator (AGMARDT)"
        link: "#"
        abstract: "Developed an AI-based irrigation monitoring tool using satellite imagery to detect irrigation inconsistencies and improve water efficiency."

      - title: "High-Accuracy Rice Identification — ESA Funded"
        link: "#"
        abstract: "Led geospatial analysis and remote sensing workflows for rice mapping in the Mekong Delta using multi-source satellite imagery."

      - title: "UAV + Satellite Crop Monitoring Pipelines"
        link: "#"
        abstract: "Developed Python pipelines for Sentinel-2 and UAV imagery download, preprocessing, feature extraction, and reporting."

      - title: "RentFinder NZ — AI-Powered Rental Search"
        link: "https://www.rentfinder.nz"
        abstract: "Built a full-stack rental search platform with AI-powered search, verified listings, and admin moderation tools using React, Express, and PostgreSQL."

      - title: "Timia — Salon Booking Platform"
        link: "https://www.facebook.com/timia.nz"
        abstract: "Developed a multi-tenant SaaS booking platform with scheduling, online booking, and role-based access management."

