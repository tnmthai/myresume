experiences:
    title: Experiences
    info:
      - role: <strong>Geospatial Research Assistant</strong>
        time: <em>05/2022 - 10/2025</em>
        company: Lincoln Agritech Ltd., Lincoln, New Zealand
        details: |
            <p><span>&#45;</span> Delivered end-to-end GIS and remote sensing workflows using <strong>QGIS, ArcGIS, Google Earth Engine, and Python</strong>.
            <p><span>&#45;</span> Built reproducible pipelines for satellite and UAV imagery acquisition, preprocessing, modelling, and reporting.
            <p><span>&#45;</span> Worked with multi-source EO data (Sentinel-2 and UAV platforms such as eBeeX/Pix4D) to support applied research and operational decisions.
            <p><span>&#45;</span> Produced technical reports, workshop materials, and research outputs for mixed technical/non-technical stakeholders.

      - role: <strong>Research Technician</strong>
        time: <em>01/2022 - 04/2022</em>
        company: Bio-Protection Research Centre, Lincoln University
        details: |
            <p><span>&#45;</span> Supported field and lab experiments by preparing equipment, materials, and experimental setups.
            <p><span>&#45;</span> Collected, organised, and quality-checked gas/soil field samples for downstream analysis.
            <p><span>&#45;</span> Maintained laboratory and field operation readiness across concurrent research activities.

      - role: <strong>Statistical Analysis and Machine Learning Consultant</strong>
        time: <em>02/2022 - 04/2022</em>
        company: N3T, Whangārei, New Zealand
        details: |
            <p><span>&#45;</span> Performed data cleansing, statistical analysis, and machine learning experiments for product analytics.
            <p><span>&#45;</span> Developed data visualisations and PDF reporting workflows for decision support.
            <p><span>&#45;</span> Contributed to backend-frontend integration and AWS-based deployment setup.

      - role: <strong>Postdoctoral Researcher (AI / Machine Learning)</strong>
        time: <em>08/2021 – 12/2021</em>
        company: Lincoln University, New Zealand
        details: |
            <p><span>&#45;</span> Built and analysed neural-network models (including RNN-based approaches) for biological system dynamics.
            <p><span>&#45;</span> Implemented data processing, modelling, and visualisation in Python/MATLAB to generate research-grade outputs.
            <p><span>&#45;</span> Translated analytical findings into papers, reports, and technical documentation.

      - role: <strong>PhD Candidate (Dean’s List)</strong>
        time: <em>04/2017 – 08/2021</em>
        company: Lincoln University, New Zealand
        details: |
            <p><span>&#45;</span> Researched autonomous self-repair systems using neural-network-based computational frameworks.
            <p><span>&#45;</span> Designed and evaluated multiple algorithmic approaches for tissue/organism regeneration modelling.
            <p><span>&#45;</span> Published research outputs and contributed peer-review service to journals and conferences.

      - role: <strong>Data Analyst (AI / Machine Learning)</strong>
        time: <em>09/2019 – 12/2019</em>
        company: Lincoln University, New Zealand
        details: |
            <p><span>&#45;</span> Prepared and structured datasets for neural-network analysis of biological tissues.
            <p><span>&#45;</span> Implemented modelling and visualisation workflows to examine memory and topology effects in Hopfield networks.
            <p><span>&#45;</span> Synthesised findings into technical reports and publication-ready research content.


projects:
    title: Skills &amp; Proficiency
    intro: >

        <strong>Technical skills:</strong>
        <p><span>&#45;</span> Programming Languages: Python: 6+ years focusing on data preprocessing and analysis; 1 year specializing in geospatial data. Proficient in R for image acquisition and statistics. Competent in C/C++ for algorithm development.
        <p><span>&#45;</span> Relational Databases: Over 5 years of practical experience in SQL, PL/SQL, T-SQL, and PL/pgSQL.
        <p><span>&#45;</span> Geospatial Expertise: Proficient in GIS data handling, utilizing GPS devices, UAV technology, and ground sensing sensors.
        <p><span>&#45;</span> Data Analysis Tools: Skilled in Python, R, Tableau, PowerBI, and SAS for diverse data analysis needs.
        <p><span>&#45;</span> Research and Review: Experienced in writing and reviewing research papers.
        <p><strong>Personal strengths:</strong>
        <p><span>&#45;</span> Strong Work Ethic: Demonstrated through academic studies and employment.
        <p><span>&#45;</span> Creative Problem-Solving: Positive, adaptable, and flexible mindset for resolving challenges.
        <p><span>&#45;</span> Analytical Skills: Good at research, observant, patient, safety-conscious, and adept at problem-solving.
        <p><span>&#45;</span> Communication and Organization: Strong written and verbal communication skills, organized, and efficient in planning.
        <p><span>&#45;</span> Team Player: Capable of working independently and collaboratively within a team.
        <p><span>&#45;</span> Passion for Growth: Enthusiastic about learning, self-development, building relationships, and embracing innovative work methodologies.
projects:
    title: Selected GeoAI / Remote Sensing Projects
    intro: >
      I design operational geospatial systems that translate Earth observation data into decisions cities and organisations can execute.
      I am currently open to roles in <strong>GIS Research, Remote Sensing Science, and Climate Risk Analytics</strong>.
    assignments:
      - title: Extreme Heat Resilience Decision System (TLC 2026 submission)
        link: "#"
        abstract: "Built a neighbourhood-level heat-risk workflow combining satellite EO, weather inputs, and local vulnerability layers for 24-72h action planning. Target outcomes: 2-5°C hotspot cooling, >=20% reduction in heat-exposure hours, and 10-25% cooling-energy reduction in intervention sites."

      - title: High-Accuracy Rice Identification Tool (ESA-funded case study, Dong Thap)
        link: "#"
        abstract: "Developed geospatial classification workflows for rice mapping in the Mekong Delta using multi-source remote sensing data to support agricultural monitoring and planning."

      - title: UAV + Satellite Crop Monitoring Workflows (Lincoln Agritech)
        link: "#"
        abstract: "Developed Python-based pipelines for imagery download, preprocessing, feature extraction, and reporting from Sentinel and UAV datasets to improve reproducible agronomic analysis."

      - title: Bucket Test from Space (PI)
        link: "#"
        abstract: "Developed an AI tool using satellite imagery to detect irrigation issues and improve farm water efficiency."

      - title: Geospatial Capacity Building and Applied Research Delivery
        link: "#"
        abstract: "Led workshops, technical documentation, and collaborative implementation across researchers, field teams, and stakeholders to convert GeoAI outputs into operational decisions."

oss:
    title: Medium articles
    intro: >
      Geospatial analysis is a rapidly growing field that combines geography, spatial data and technology to provide insights into a wide range of applications. Whether you're analyzing urban planning, disaster response, or the spread of disease, geospatial analysis provides a unique perspective on complex problems. In this blog, we will explore the latest trends, techniques and tools in geospatial analysis, and how it is changing the way we understand the world around us.
    contributions:
      - title: 1. <a href="https://tnmthai.medium.com/spatial-programming-remote-sensing-6f0839ec3b03" class="underline" target="_blank" rel="noopener noreferrer">Spatial Programming & Remote Sensing</a>
        link: "#"
        tagline: "Spatial programming and remote sensing are essential components of modern technology and are transforming the way we understand our world."

      - title: 2. <a href="https://tnmthai.medium.com/apply-masks-on-satellite-images-1e17e66d6473" class="underline" target="_blank" rel="noopener noreferrer">Apply masks on Satellite Images</a>
        link: "#"
        tagline: "When we use Satellite Imagery, they usually provide masks for clouds, water, etc. I will show you how to apply masks to remove water pixels from satellite images."

      - title: 3. <a href="https://tnmthai.medium.com/remove-photo-background-by-python-b7b14da30126" class="underline" target="_blank" rel="noopener noreferrer">Remove photo background by Python</a>
        link: "#"
        tagline: "Removing the background of an image using Python can be done using image processing and computer vision techniques. One popular method is using the OpenCV library, which provides a range of tools and functions for image processing and computer vision."

      - title: 4. <a href="https://tnmthai.medium.com/watermark-photos-with-python-d8c14d9703af" class="underline" target="_blank" rel="noopener noreferrer">Watermark Photos with Python</a>
        link: "#"
        tagline: "To watermark photos using Python, you can use the Python Imaging Library (PIL) or OpenCV library. Both libraries provide tools for image processing and can be used to add a watermark to an image."

      - title: 5. <a href="https://tnmthai.medium.com/chatgpt-api-with-python-e5690dace115" class="underline" target="_blank" rel="noopener noreferrer">ChatGPT API with Python</a>
        link: "#"
        tagline: "To use the OpenAI API with Python, you will need to use the OpenAI API client library, which provides a Python interface for the API. The API client library makes it easy to interact with the API, allowing you to send requests to the API and receive responses in a convenient and easy-to-use format."

