career-profile:
    title: About me
    summary: |
      <p><span>&#45;</span> I am a PhD-trained GeoAI researcher (Lincoln University, NZ) focused on <strong>GIS, Remote Sensing, and climate-risk applications</strong>. My work connects Earth observation data with practical interventions in urban resilience and environmental management.
      <p><span>&#45;</span> I work across <strong>QGIS, ArcGIS, Google Earth Engine, Python, and geospatial analytics pipelines</strong> to build end-to-end workflows: from data ingestion and modelling to decision-ready outputs.
      <p><span>&#45;</span> I am currently seeking roles as a <strong>GIS Researcher / Remote Sensing Scientist / Geospatial Data Scientist</strong>, with a focus on delivering measurable, decision-ready outcomes.
