career-profile:
    title: About Me
    summary: |
      <p><span>&#45;</span> <strong>GIS and Remote Sensing specialist</strong> with 15+ years in geospatial analysis, enterprise GIS, and applied research. PhD in Computer Science (Dean's List) with 6 peer-reviewed publications.
      <p><span>&#45;</span> Experienced in <strong>ArcGIS Pro, QGIS, Python, SQL Server, Google Earth Engine, Pix4D, and UAV operations</strong>. Delivered location intelligence products for government agencies, defence, renewable energy, and environmental clients.
      <p><span>&#45;</span> Strong track record in <strong>client engagement, proposal writing, technical documentation, and stakeholder communication</strong> across consulting, research, and academic environments.
      <p><span>&#45;</span> Currently seeking <strong>GIS Analyst / Remote Sensing Scientist / Geospatial Data Scientist</strong> roles in Australia or New Zealand.

education:
    title: Education
    info:
      - degree: PhD in Computer Science (Dean's List)
        university: Lincoln University — New Zealand
        time: 2017 – 2021
        details: |
          Full PhD Scholarship (Ministry of Education and Training, Vietnam). Research: autonomous regeneration systems using neural-network-based computational frameworks. Supervised by Prof. Sandhya Samarasinghe and Prof. Don Kulasiri, with collaboration from Prof. Michael Levin (Harvard/Tufts).

      - degree: Master of Science in Computer Science and Engineering
        university: National Chiao Tung University — Taiwan
        time: 2012 – 2014
        details: |
          Full MSc Scholarship. Focus: Data Mining, AI, and Machine Learning. Thesis: Methods for Abnormal Usage Detection in Smart Home Systems.

experiences:
    title: Professional Experience
    info:
      - role: <strong>Geospatial Research Assistant</strong>
        time: <em>05/2022 – 10/2025</em>
        company: Lincoln Agritech Ltd., Lincoln University, New Zealand
        details: |
            <p><span>&#45;</span> Led <strong>end-to-end geospatial workflows</strong> for satellite (Sentinel-2) and UAV imagery: acquisition, processing, analysis, and reporting.
            <p><span>&#45;</span> Developed <strong>Python-based automation</strong> for satellite and UAV data processing, improving efficiency and reproducibility.
            <p><span>&#45;</span> Operated <strong>eBeeX UAV</strong> (RedEdge, Duet T, SODA 3D sensors); processed imagery using <strong>Pix4D</strong> for orthomosaics and DSMs.
            <p><span>&#45;</span> Operated <strong>RTK-GNSS systems</strong> (Trimble R10) for high-accuracy spatial data capture.
            <p><span>&#45;</span> Developed <strong>SOPs and technical documentation</strong> for UAV, GNSS, and remote sensing data acquisition.
            <p><span>&#45;</span> Delivered training, workshops, and technical reports for <strong>industry partners and research stakeholders</strong>.

      - role: <strong>GIS Mapping & Analysis Resource — Consulting Contract</strong>
        time: <em>05/2025 – 07/2025</em>
        company: Christchurch City Council, New Zealand
        details: |
            <p><span>&#45;</span> Managed parcel, zoning, and District Plan datasets within an <strong>enterprise GIS environment</strong> (SQL Server geodatabases).
            <p><span>&#45;</span> Maintained spatial data integrity and compliance with <strong>enterprise standards and governance frameworks</strong>.
            <p><span>&#45;</span> Performed data validation and prepared datasets for publication to enterprise systems.
            <p><span>&#45;</span> Produced <strong>statutory planning maps</strong> and spatial outputs for planners and internal stakeholders.
            <p><span>&#45;</span> Collaborated across business units to deliver accurate, fit-for-purpose spatial solutions.

      - role: <strong>Research Technician</strong>
        time: <em>11/2025 – Present</em>
        company: Lincoln University, New Zealand
        details: |
            <p><span>&#45;</span> Manage laboratory environments for education and research, including experimental apparatus preparation and specimen handling.
            <p><span>&#45;</span> Collect and systematise field samples (gas, soil) for scientific analysis — cleaning, filtration, and quality control.
            <p><span>&#45;</span> Execute experimental setups and field research activities; compile findings into reports and scholarly papers.

      - role: <strong>Lecturer and Researcher</strong>
        time: <em>10/2008 – Present</em>
        company: Can Tho University, Vietnam
        details: |
            <p><span>&#45;</span> Delivered undergraduate and Master's courses in <strong>GIS, Programming, Database Systems, Data Mining, and Information Systems</strong>.
            <p><span>&#45;</span> Supervised <strong>30+ undergraduate projects and 3 Master's graduates</strong> in computing and spatial analysis.
            <p><span>&#45;</span> Designed course materials, practical laboratory sessions, and assessment frameworks across in-person, blended, and online formats.
            <p><span>&#45;</span> Led <strong>European Space Agency-funded</strong> rice identification project (PI) for the Mekong Delta (2023–2024).
            <p><span>&#45;</span> Organised workshops in GIS, Python, and Remote Sensing for students and professionals.

      - role: <strong>Postdoctoral Researcher — AI / Machine Learning</strong>
        time: <em>07/2021 – 12/2021</em>
        company: Lincoln University, New Zealand
        details: |
            <p><span>&#45;</span> Built and analysed <strong>neural-network models</strong> (including RNN-based approaches) for biological system dynamics.
            <p><span>&#45;</span> Implemented data processing, modelling, and visualisation in <strong>Python, MATLAB, and R</strong>.
            <p><span>&#45;</span> Authored scholarly articles and analytical reports.

projects:
    title: Selected Projects
    intro: |
        Key projects demonstrating applied geospatial expertise across government, defence, agriculture, and environmental sectors.
    assignments:
      - title: "Extreme Heat Resilience Decision System (Ongoing)"
        link: "#"
        abstract: "Neighbourhood-level heat-risk workflow combining satellite EO, weather inputs, and vulnerability layers for 24-72h action planning. Target: 2-5°C hotspot cooling, ≥20% reduction in heat-exposure hours."

      - title: "Bucket Test from Space — Principal Investigator (AGMARDT)"
        link: "#"
        abstract: "AI tool using satellite imagery to detect irrigation issues and improve farm water efficiency. Led end-to-end research from data acquisition to prototype delivery for industry partners."

      - title: "High-Accuracy Rice Identification — Mekong Delta (ESA-Funded, PI)"
        link: "#"
        abstract: "Led applied geospatial analysis and tool development for rice mapping using multi-source remote sensing data. European Space Agency funded, 2023–2024, with international partners."

      - title: "Tracking Pasture Quality with Satellite Imagery (MBIE–NASA)"
        link: "#"
        abstract: "UAV lead pilot for data collection. Applied PROSAIL radiative transfer models validated with APSIM and ground truthing. Developed protocols for government stakeholders."

      - title: "Mānuka Identification Tool (Mānuka Health)"
        link: "#"
        abstract: "Sentinel-2 processing (L1C→L2A), data mining, statistical modelling, and custom ArcGIS toolboxes for industry client."

      - title: "UAV + Satellite Crop Monitoring Pipelines"
        link: "#"
        abstract: "Python-based pipelines for imagery download, preprocessing, feature extraction, and reporting from Sentinel-2 and UAV datasets."

