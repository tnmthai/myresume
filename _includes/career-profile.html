{% assign career-profile = site.data.data.career-profile %}
{% if career-profile %}
<section class="section summary-section">
  <h2 class="section-title accordion-toggle" onclick="toggleAccordion(this)">
    <span class="fa-stack fa-xs">
      <i class="fas fa-circle fa-stack-2x"></i>
      <i class="fas fa-user fa-stack-1x fa-inverse"></i>
    </span>
    {{ career-profile.title }}
    <span class="chevron"><i class="fas fa-chevron-down"></i></span>
  </h2>

  <div class="accordion-content" style="text-align: justify;">
    {% assign summary = career-profile.summary | capitalize_sentences %}
    {{ summary | markdownify }}
  </div>
</section>
{% endif %}
