{% assign skills = site.data.data.skills %}
{% if skills %}
<section class="skills-section section">
  <h2 class="section-title accordion-toggle" onclick="toggleAccordion(this)">
    <span class="section-icon"><i class="fas fa-wrench"></i></span>
    {{ skills.title }}
    <span class="chevron"><i class="fas fa-chevron-down"></i></span>
  </h2>

  <div class="accordion-content">
    <div class="skills-grid">
      {% for skill in skills.toolset %}
      <div class="skill-item">
        <div class="skill-header">
          <span class="skill-name">{{ skill.name }}</span>
          <span class="skill-level">{{ skill.level }}</span>
        </div>
        <div class="level-bar">
          <div class="level-bar-inner" data-level="{{ skill.level }}"></div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>
{% endif %}
